<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به بلو بانک</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #0033cc, #00aaff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://source.unsplash.com/random/1920x1080/?abstract,blue') no-repeat center center/cover;
            opacity: 0.15;
            z-index: -1;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 51, 204, 0.25);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .logo-placeholder {
            width: 90px;
            height: 90px;
            background: #f0f4ff;
            border: 3px dashed #0066ff;
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #0066ff;
            font-weight: 500;
        }
        
        h1 {
            margin: 10px 0 35px;
            color: #0033cc;
            font-size: 28px;
            font-weight: 700;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0066ff, #00aaff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 102, 255, 0.4);
        }
        
        .forgot {
            color: #0066ff;
            text-decoration: none;
            font-size: 14.5px;
            margin-top: 18px;
            display: inline-block;
        }
        
        .forgot:hover {
            text-decoration: underline;
        }
        
        .footer {
            margin-top: 35px;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- آیکون بلو - خالی برای شما -->
        <div class="logo-placeholder">
            لوگو بلو<br>اینجا قرار می‌گیرد
        </div>
        
        <h1>ورود به بلو بانک</h1>
        
        <form>
            <div class="input-group">
                <input type="text" placeholder="نام کاربری یا شماره موبایل" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="رمز عبور" required>
            </div>
            
            <button type="submit" class="btn">ورود امن</button>
        </form>
        
        <a href="#" class="forgot">فراموشی رمز عبور؟</a>
        
        <div class="footer">
            <p>بانک دیجیتال بلو</p>
            <p>© ۱۴۰۵ - همه حقوق محفوظ است</p>
        </div>
    </div>
</body>
  </html>
